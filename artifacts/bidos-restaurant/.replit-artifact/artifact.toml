kind = "web"
previewPath = "/"
title = "Bido's Restaurant"
version = "1.0.0"
id = "artifacts/bidos-restaurant"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18249

[services.development]
run = "pnpm --filter @workspace/bidos-restaurant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bidos-restaurant", "run", "build" ]
publicDir = "artifacts/bidos-restaurant/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18249"
BASE_PATH = "/"
